<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDUSTRY GIANTS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- FAVICONS -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
  height:100vh;
  transition: background 1s linear;
}

/* scanlines */
body:before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,.03),
    rgba(255,255,255,.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* glitch text */
.glitch{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:48px;
  letter-spacing:8px;
  text-align:center;
  white-space:nowrap;
}
.glitch:before,
.glitch:after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  overflow:hidden;
}
.glitch:before{
  left:2px;
  text-shadow:-2px 0 red;
  clip-path:polygon(0 0,100% 0,100% 45%,0 45%);
  animation:glitch1 2s infinite linear alternate-reverse;
}
.glitch:after{
  left:-2px;
  text-shadow:-2px 0 cyan;
  clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);
  animation:glitch2 2s infinite linear alternate-reverse;
}
@keyframes glitch1{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(-2px,-2px)}
60%{transform:translate(2px,2px)}
80%{transform:translate(1px,-1px)}
100%{transform:translate(0)}
}
@keyframes glitch2{
0%{transform:translate(0)}
20%{transform:translate(2px,-2px)}
40%{transform:translate(2px,2px)}
60%{transform:translate(-2px,-1px)}
80%{transform:translate(1px,2px)}
100%{transform:translate(0)}
}

/* hidden lyric fragments */
.clue{
  position:absolute;
  font-size:11px;
  opacity:.18;
  color:#aaa;
  transition:text-shadow 0.3s ease-in-out, color 0.3s ease-in-out;
  pointer-events:none;
}

/* ripcord container */
#cord{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* wire */
#wire{
  width:3px;
  background:repeating-linear-gradient(
    45deg,
    #dcdcdc,
    #dcdcdc 2px,
    #888 2px,
    #888 4px
  );
}

/* handle wrapper */
#handle-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  position:absolute;
  top:-100px;
  transition:top 1.4s cubic-bezier(.22,.61,.36,1);
}

/* simple pulley handle */
#handle{
  width:40px;
  height:20px;
  border:5px solid #ff2b2b;
  border-radius:6px;
  background:transparent;
  box-shadow: inset 0 0 5px rgba(255,0,0,.4),0 0 6px rgba(255,0,0,.6);
}

/* email capture */
#signup{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  display:none;
  text-align:center;
  z-index:50;
}
input{
  background:#000;
  border:1px solid #444;
  color:#fff;
  padding:10px;
  font-family:inherit;
  width:260px;
}
button{
  background:#111;
  border:1px solid #555;
  color:#fff;
  padding:10px 20px;
  margin-left:6px;
  cursor:pointer;
}

/* footer */
#footer{
  position:absolute;
  bottom:2%;
  font-size:10px;
  opacity:.25;
  letter-spacing:3px;
}

/* MOBILE RESPONSIVE */
@media (max-width:768px){
  .glitch{
    font-size:32px;
    letter-spacing:3px;
    top:40%;
  }
  #handle{width:35px; height:18px; border:4px solid #ff2b2b;}
  #signup input{width:180px;}
  #signup button{padding:8px 16px; margin-left:4px;}
}
</style>
</head>
<body>

<div class="glitch" data-text="CLOSE YOUR EYES AND PULL THE RIPCORD">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

<div class="clue" id="c1">working so late on the corporate shift</div>
<div class="clue" id="c2">she cried all night</div>
<div class="clue" id="c3">it’s a necessary torture</div>
<div class="clue" id="c4">no one coming to save you</div>
<div class="clue" id="c5">registry office</div>

<div id="cord">
  <div id="wire"></div>
  <div id="handle-wrapper">
    <div id="handle"></div>
  </div>
</div>

<div id="signup">
<form action="https://formspree.io/f/xzdjpndk" method="POST">
<input type="email" name="email" placeholder="enter email" required>
<button>JOIN</button>
</form>
</div>

<div id="footer">
INDUSTRY GIANTS // IG-001
</div>

<audio id="track" loop>
<source src="ripcord_loop.mp3" type="audio/mpeg">
</audio>

<script>
const handleWrapper = document.getElementById("handle-wrapper");
const cord = document.getElementById("cord");
const audio = document.getElementById("track");
const wire = document.getElementById("wire");
const clues = document.querySelectorAll(".clue");
const signup = document.getElementById("signup");
const glitch = document.querySelector(".glitch");

// detect mobile
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// MOBILE: scatter clues randomly without overlapping each other or signup
const maxActiveClues = 2;
const mobileClues = Array.from(clues);

function placeRandomClues(){
  if(!isMobile) return;
  // reset all
  mobileClues.forEach(c=>{
    c.style.display="none";
  });
  const available = [...mobileClues];
  const active = [];
  while(active.length<maxActiveClues && available.length>0){
    const idx = Math.floor(Math.random()*available.length);
    const clue = available.splice(idx,1)[0];
    // random positions avoiding signup box (bottom ~20%)
    const top = Math.random()*70; // percent
    const left = Math.random()*80; 
    clue.style.top=top+"%";
    clue.style.left=left+"%";
    clue.style.right="auto";
    clue.style.display="block";
    active.push(clue);
  }
}

// initial drop
setTimeout(()=>{
  handleWrapper.style.top="40vh";
  wire.style.height="40vh";
},100);

// animate wire height continuously to follow handle
function updateWire(){
  const handleRect = handleWrapper.getBoundingClientRect();
  wire.style.height = handleRect.top + "px";
  requestAnimationFrame(updateWire);
}
requestAnimationFrame(updateWire);

// click or drag to activate ripcord
let dragging=false;
let startY=0;
handleWrapper.addEventListener("touchstart",(e)=>{
  dragging=true;
  startY=e.touches[0].clientY;
});
handleWrapper.addEventListener("touchmove",(e)=>{
  if(!dragging) return;
  let dy = e.touches[0].clientY - startY;
  if(dy>0) handleWrapper.style.top=Math.min(40+dy*0.1,"40vh");
});
handleWrapper.addEventListener("touchend",(e)=>{
  if(dragging){
    activateRipcord();
    dragging=false;
  }
});
handleWrapper.addEventListener("click",activateRipcord);

let activated=false;
function activateRipcord(){
  if(activated) return;
  activated=true;
  glitch.style.display="none";
  setTimeout(()=>{signup.style.display="block"},500);

  // retract handle
  handleWrapper.style.transition="top 0.8s ease-in";
  handleWrapper.style.top="-150px"; // off top of screen

  // audio fade in
  audio.volume=0;
  audio.play().catch(e=>console.log(e));
  const targetVol=0.5;
  const fadeDur=3000;
  let start=null;
  function fadeIn(ts){
    if(!start) start=ts;
    const prog=ts-start;
    audio.volume=Math.min(prog/fadeDur*targetVol,targetVol);
    if(prog<fadeDur) requestAnimationFrame(fadeIn);
    else audio.volume=targetVol;
  }
  requestAnimationFrame(fadeIn);

  // mobile clue randomization
  if(isMobile){
    setInterval(placeRandomClues,1200);
  } else {
    // desktop: glow clues individually
    let index=0;
    function pulseClues(){
      clues.forEach(c=>{
        c.style.color="#aaa";
        c.style.textShadow="";
      });
      const clue = clues[index];
      let t0=null;
      function pulse(ts){
        if(!t0) t0=ts;
        const sine = (Math.sin((ts-t0)/600)+1)/2; // ~1.2s
        const r = Math.floor(255*sine+100);
        const g = Math.floor(255*sine+100);
        const b = Math.floor(255*sine+100);
        clue.style.color=`rgb(${r},${g},${b})`;
        clue.style.textShadow=`0 0 ${4+10*sine}px red,0 0 ${8+10*sine}px red`;
        requestAnimationFrame(pulse);
      }
      requestAnimationFrame(pulse);
      index = (index+1)%clues.length;
      setTimeout(pulseClues,1200);
    }
    pulseClues();
  }

  // dark blue background pulsation
  let startBG=null;
  function animateBG(ts){
    if(!startBG) startBG=ts;
    const t=(ts-startBG)/1000;
    const sine=Math.sin(t*0.3);
    const b=8+3*((sine+1)/2);
    document.body.style.backgroundColor=`rgb(0,0,${b})`;
    requestAnimationFrame(animateBG);
  }
  requestAnimationFrame(animateBG);
}
</script>
</body>
</html>
