<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ripcord</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* TEXT */

#title{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:48px;
letter-spacing:6px;
text-align:center;
white-space:nowrap;
}

/* RIPCORD CONTAINER */

#cord{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
pointer-events:none;
z-index:10;
}

/* WIRE */

#wire{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:3px;
height:0;
background:repeating-linear-gradient(
45deg,
#e0e0e0,
#e0e0e0 2px,
#9a9a9a 2px,
#9a9a9a 4px
);
transition:height 1.4s cubic-bezier(.22,.61,.36,1);
}

/* HANDLE */

#handle{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:110px;
cursor:pointer;
pointer-events:auto;
transition:top 1.4s cubic-bezier(.22,.61,.36,1);
}

/* T BAR */

.bar{
position:absolute;
top:0;
width:140px;
height:45px;
border-radius:30px;
background:linear-gradient(#ff2b2b,#b30000);
box-shadow:
inset 0 0 10px rgba(0,0,0,.6),
0 0 10px rgba(255,0,0,.8);
}

/* STEM */

.stem{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:46px;
height:70px;
border-radius:25px;
background:linear-gradient(#ff2b2b,#b30000);
box-shadow:
inset 0 0 10px rgba(0,0,0,.6),
0 0 10px rgba(255,0,0,.8);
}

</style>
</head>

<body>

<div id="title">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

<div id="cord">
<div id="wire"></div>

<div id="handle">
<div class="bar"></div>
<div class="stem"></div>
</div>
</div>

<script>

const handle = document.getElementById("handle")
const wire = document.getElementById("wire")

const DROP_DISTANCE = 260

/* initial drop */

setTimeout(()=>{

wire.style.height = DROP_DISTANCE + "px"
handle.style.top = DROP_DISTANCE + "px"

},1000)

/* pull action */

handle.onclick = ()=>{

wire.style.transition="height .6s ease-in"
handle.style.transition="top .6s ease-in"

wire.style.height="0px"
handle.style.top="-140px"

}

</script>

</body>
</html>
