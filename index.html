<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Industry Giants</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.scanlines::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.04),
rgba(255,255,255,0.04) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
}

#container{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#text{
font-size:clamp(24px,4vw,48px);
letter-spacing:4px;
opacity:0;
transition:opacity 1s;
text-shadow:
2px 0 red,
-2px 0 cyan;
}

#cord{
position:absolute;
top:-300px;
display:flex;
flex-direction:column;
align-items:center;
transition:top 2s ease;
}

#wire{
width:4px;
height:220px;
background:linear-gradient(#ddd,#aaa);
}

#handle{
width:150px;
height:90px;
border-radius:50px;
border:14px solid #b30000;
border-bottom:40px solid #b30000;
background:linear-gradient(#ff3a3a,#b30000);
cursor:pointer;
box-shadow:
inset 0 0 10px rgba(0,0,0,0.7),
0 0 10px rgba(255,0,0,0.6);
}

.jiggle{
animation:jiggle 1.2s infinite;
}

@keyframes jiggle{
0%{transform:translateY(0)}
50%{transform:translateY(10px)}
100%{transform:translateY(0)}
}

#signup{
position:absolute;
opacity:0;
transition:opacity 1.5s;
}

input{
padding:12px;
font-size:16px;
border:none;
border-radius:6px;
margin-right:6px;
}

button{
padding:12px 18px;
font-size:16px;
background:red;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

#message{
font-size:22px;
margin-bottom:15px;
}

</style>
</head>

<body class="scanlines">

<div id="container">

<div id="cord">
<div id="wire"></div>
<div id="handle"></div>
</div>

<div id="text">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

<div id="signup">

<div id="message">
You pulled the ripcord.<br>
Enter your email for your unique ID.
</div>

<form id="fanForm" action="https://formspree.io/f/xzdjpndk" method="POST">

<input type="hidden" name="fan_id" id="fanID">

<input type="email" name="email" placeholder="email address" required>

<button type="submit">JOIN</button>

</form>

</div>

</div>

<audio id="track" loop>
<source src="sample.mp3" type="audio/mpeg">
</audio>

<script>

const cord=document.getElementById("cord")
const handle=document.getElementById("handle")
const text=document.getElementById("text")
const signup=document.getElementById("signup")
const audio=document.getElementById("track")

let pulled=false

function descend(){

cord.style.top="120px"

setTimeout(()=>{
text.style.opacity=1
},2000)

setTimeout(()=>{
handle.classList.add("jiggle")
},4500)

}

window.onload=descend

handle.addEventListener("click",pull)

function pull(){

if(pulled)return
pulled=true

handle.classList.remove("jiggle")

cord.style.top="-300px"

fadeAudio()

setTimeout(()=>{

text.style.opacity=0

signup.style.opacity=1

generateID()

},1500)

}

function fadeAudio(){

audio.volume=0
audio.play()

let v=0

let fade=setInterval(()=>{

v+=0.02
audio.volume=v

if(v>=0.5){
audio.volume=0.5
clearInterval(fade)
}

},120)

}

async function generateID(){

const res=await fetch("https://api.countapi.xyz/hit/industry-giants/ripcord")

const data=await res.json()

const id="IG-"+String(data.value).padStart(3,"0")

document.getElementById("fanID").value=id

window.generatedID=id

}

</script>

</body>
</html>
