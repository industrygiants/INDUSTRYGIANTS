<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Giants</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

/* scanline effect */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,.04),
rgba(255,255,255,.04) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

/* center text */

.center{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
opacity:0;
transition:opacity 1.5s;
}

.center.show{
opacity:1;
}

/* glitch text */

.glitch{
font-size:2rem;
letter-spacing:4px;
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
opacity:.7;
}

.glitch::before{
color:red;
animation:g1 1s infinite;
}

.glitch::after{
color:cyan;
animation:g2 1s infinite;
}

@keyframes g1{
0%{transform:translate(2px,0)}
50%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}

@keyframes g2{
0%{transform:translate(-2px,0)}
50%{transform:translate(2px,-2px)}
100%{transform:translate(0,0)}
}

/* blinds */

#blind{
position:fixed;
top:-100%;
left:0;
width:100%;
height:100%;
background:black;
transition:top 1s ease;
z-index:10;
}

/* signup */

#signup{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:11;
}

input{
padding:12px;
background:black;
border:1px solid white;
color:white;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<div class="center" id="text">
<div class="glitch" data-text="CLOSE YOUR EYES AND PULL THE RIPCORD">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>
</div>

<!-- RIPCORD -->

<svg id="ripcord" width="220" height="600" style="position:absolute; left:50%; transform:translateX(-50%);">

<!-- cable -->

<line id="cord"
x1="110"
y1="0"
x2="110"
y2="0"
stroke="#888"
stroke-width="3"
stroke-linecap="round"/>

<!-- inverted parachute handle -->

<g id="handle" transform="translate(110,0)" style="cursor:grab">

<path d="
M -80 -25
Q -95 -25 -95 0
Q -95 25 -80 25
L -25 25
L -25 70
Q -25 90 0 90
Q 25 90 25 70
L 25 25
L 80 25
Q 95 25 95 0
Q 95 -25 80 -25
Z
"
fill="#c40000"
stroke="#6b0000"
stroke-width="4"/>

</g>

</svg>

<div id="blind"></div>

<div id="signup">

<h2>INDUSTRY GIANTS</h2>
<p>Enter your email</p>

<form action="https://formspree.io/f/YOURID" method="POST">
<input type="email" name="email" placeholder="email address" required>
<button>JOIN</button>
</form>

</div>

<script>

const cord=document.getElementById("cord")
const handle=document.getElementById("handle")
const text=document.getElementById("text")
const blind=document.getElementById("blind")
const signup=document.getElementById("signup")

let drop=0
let maxDrop=260

/* descend from ceiling with extending cable */

function lowerRipcord(){

drop+=2

cord.setAttribute("y2",drop)
handle.setAttribute("transform","translate(110,"+drop+")")

if(drop<maxDrop){
requestAnimationFrame(lowerRipcord)
}else{

setTimeout(()=>{
text.classList.add("show")
enableInteraction()
},500)

}

}

setTimeout(lowerRipcord,800)

/* interaction */

let pulling=false
let startY
let base=maxDrop
let maxPull=200

function enableInteraction(){

handle.addEventListener("mousedown",start)
document.addEventListener("mousemove",move)
document.addEventListener("mouseup",end)

handle.addEventListener("touchstart",start)
document.addEventListener("touchmove",move)
document.addEventListener("touchend",end)

}

function start(e){

pulling=true
startY=(e.touches?e.touches[0].clientY:e.clientY)

}

function move(e){

if(!pulling)return

let y=(e.touches?e.touches[0].clientY:e.clientY)
let diff=y-startY

if(diff<0) diff=0
if(diff>maxPull) diff=maxPull

let newY=base+diff

handle.setAttribute("transform","translate(110,"+newY+")")
cord.setAttribute("y2",newY)

}

function end(){

if(!pulling)return
pulling=false

let y=handle.transform.baseVal.getItem(0).matrix.f

if(y>base+150){

blind.style.top="0"

setTimeout(()=>{
signup.style.display="block"
},900)

}else{

handle.setAttribute("transform","translate(110,"+base+")")
cord.setAttribute("y2",base)

}

}

</script>

</body>
</html>
