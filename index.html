<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pull The Ripcord</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

/* background scan lines */

body::after{
content:"";
position:absolute;
inset:0;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 2px,
transparent 4px
);
pointer-events:none;
}

/* main container */

.scene{
position:relative;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* cord */

.cord{
position:absolute;
top:0;
width:3px;
height:40vh;
background:linear-gradient(#bbb,#eee,#999);
}

/* handle */

.handle{
position:absolute;
top:40vh;
width:min(240px,45vw);
height:min(140px,26vw);
cursor:pointer;
transform:translateY(-50%);
transition:transform .2s;
}

/* realistic red tubing */

.handle svg{
width:100%;
height:100%;
filter:drop-shadow(0 10px 12px rgba(0,0,0,.6));
}

.handle:hover{
transform:translateY(-48%);
}

/* text */

.text{
position:absolute;
top:55vh;
font-size:min(48px,7vw);
letter-spacing:.15em;
line-height:1.2;
text-transform:uppercase;
}

/* glitch style */

.glitch{
color:#fff;
text-shadow:
-2px 0 red,
2px 0 cyan;
}

/* email form */

form{
margin-top:20px;
display:none;
}

input{
padding:12px;
font-size:16px;
border:none;
border-radius:4px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
background:red;
color:white;
cursor:pointer;
border-radius:4px;
}

/* mobile adjustments */

@media (max-width:600px){

.text{
font-size:8vw;
top:60vh;
}

.cord{
height:35vh;
}

.handle{
top:35vh;
}

}

</style>
</head>

<body>

<div class="scene">

<div class="cord"></div>

<div class="handle" id="ripcord">

<svg viewBox="0 0 300 160">

<defs>
<linearGradient id="redtube" x1="0" x2="1">
<stop offset="0%" stop-color="#ff3b3b"/>
<stop offset="50%" stop-color="#d40000"/>
<stop offset="100%" stop-color="#ff3b3b"/>
</linearGradient>
</defs>

<path d="
M30 40
Q30 10 60 10
H240
Q270 10 270 40
Q270 70 240 70
H180
V120
Q180 150 150 150
Q120 150 120 120
V70
H60
Q30 70 30 40
Z"
fill="url(#redtube)"
stroke="#8a0000"
stroke-width="6"
stroke-linejoin="round"/>

</svg>

</div>

<div class="text glitch">
CLOSE YOUR EYES AND PULL<br>
THE RIPCORD
</div>

<form action="https://formspree.io/f/xzdjpndk" method="POST">
<input type="email" name="email" placeholder="email address" required>
<button>JOIN</button>
</form>

<audio id="song" loop>
<source src="sample.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const ripcord=document.getElementById("ripcord")
const audio=document.getElementById("song")
const form=document.querySelector("form")

let pulled=false

ripcord.addEventListener("mousedown",()=>{

if(pulled)return

pulled=true

ripcord.style.transform="translateY(120px)"

audio.play()

form.style.display="block"

})

</script>

</body>
</html>
