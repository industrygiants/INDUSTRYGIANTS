<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Industry Giants</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

/* scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

/* center text */

.center{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
opacity:0;
transition:opacity 1.5s;
}

.center.show{
opacity:1;
}

/* glitch text */

.glitch{
font-size:2rem;
letter-spacing:4px;
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
opacity:.7;
}

.glitch::before{
color:red;
animation:g1 1s infinite;
}

.glitch::after{
color:cyan;
animation:g2 1s infinite;
}

@keyframes g1{
0%{transform:translate(2px,0)}
50%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}

@keyframes g2{
0%{transform:translate(-2px,0)}
50%{transform:translate(2px,-2px)}
100%{transform:translate(0,0)}
}

/* ripcord */

#ripcord{
position:absolute;
top:-300px;
left:50%;
transform:translateX(-50%);
transition:top 2s ease;
}

#ripcord.drop{
top:0;
}

/* blinds */

#blind{
position:fixed;
top:-100%;
left:0;
width:100%;
height:100%;
background:black;
transition:top 1s ease;
z-index:10;
}

/* signup */

#signup{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:11;
}

input{
padding:12px;
background:black;
border:1px solid white;
color:white;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<div class="center" id="text">

<div class="glitch" data-text="CLOSE YOUR EYES AND PULL THE RIPCORD">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

</div>

<!-- RIPCORD -->

<svg id="ripcord" width="140" height="500">

<defs>

<linearGradient id="cordGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ff4040"/>
<stop offset="50%" stop-color="#990000"/>
<stop offset="100%" stop-color="#ff4040"/>
</linearGradient>

<linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ff3030"/>
<stop offset="100%" stop-color="#7a0000"/>
</linearGradient>

</defs>

<!-- cord -->

<line id="cord"
x1="70"
y1="0"
x2="70"
y2="200"
stroke="url(#cordGrad)"
stroke-width="8"
stroke-linecap="round"/>

<!-- connector -->

<circle cx="70" cy="200" r="6" fill="#660000"/>

<!-- handle -->

<g id="handle" transform="translate(70,200)" style="cursor:grab">

<rect x="-45" y="-10" width="90" height="20" rx="8" fill="url(#handleGrad)"/>
<rect x="-14" y="-10" width="28" height="40" rx="8" fill="url(#handleGrad)"/>

</g>

</svg>

<div id="blind"></div>

<div id="signup">

<h2>INDUSTRY GIANTS</h2>

<p>Enter your email</p>

<form action="https://formspree.io/f/YOURID" method="POST">
<input type="email" name="email" placeholder="email address" required>
<button>JOIN</button>
</form>

</div>

<script>

const ripcord=document.getElementById("ripcord")
const text=document.getElementById("text")
const handle=document.getElementById("handle")
const cord=document.getElementById("cord")
const blind=document.getElementById("blind")
const signup=document.getElementById("signup")

let startY
let pulling=false
let base=200
let maxPull=180

/* intro sequence */

setTimeout(()=>{
ripcord.classList.add("drop")
},500)

setTimeout(()=>{
text.classList.add("show")
},2300)

/* interaction */

function start(e){
pulling=true
startY=(e.touches?e.touches[0].clientY:e.clientY)
}

function move(e){

if(!pulling)return

let y=(e.touches?e.touches[0].clientY:e.clientY)
let diff=y-startY

if(diff<0) diff=0
if(diff>maxPull) diff=maxPull

let newY=base+diff

handle.setAttribute("transform","translate(70,"+newY+")")
cord.setAttribute("y2",newY)

}

function end(){

if(!pulling)return
pulling=false

let y=handle.transform.baseVal.getItem(0).matrix.f

if(y>base+150){

blind.style.top="0"

setTimeout(()=>{
signup.style.display="block"
},900)

}else{

handle.setAttribute("transform","translate(70,"+base+")")
cord.setAttribute("y2",base)

}

}

handle.addEventListener("mousedown",start)
document.addEventListener("mousemove",move)
document.addEventListener("mouseup",end)

handle.addEventListener("touchstart",start)
document.addEventListener("touchmove",move)
document.addEventListener("touchend",end)

</script>

</body>
</html>
